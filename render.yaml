services:
  - type: web
    name: standgeld-standalone
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disks:
      - name: app-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TZ
        value: Europe/Berlin
      - key: APP_DATA_DIR
        value: /var/data
